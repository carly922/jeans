<!DOCTYPE html>
<html>
<head>
    <title>Jeans That Fit!</title>
      <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

<div class="parent-container">
{% for item in items %}

<div class="box">

    <img src="{{ item.itemImg }}" width="200">
    <figcaption>{{item.brandName}} | {{ item.itemName }}</figcaption>
    <p>${{ item.itemPrice }}</p>

    <a href="{{ item.itemUrl }}">View Product</a>
</div>

{% endfor %}
</div>
</body>
</html>
